name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  notes:
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.extract.outputs.body }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract changelog section
        id: extract
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          BODY=$(awk "/^## \[$TAG\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY"     >> "$GITHUB_OUTPUT"
          echo "EOF"       >> "$GITHUB_OUTPUT"

  build:
    needs: notes
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: helomin-x86_64-windows.exe
            binary: target/x86_64-pc-windows-msvc/release/helomin.exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: helomin-x86_64-linux
            binary: target/x86_64-unknown-linux-musl/release/helomin

          - os: macos-latest
            target: aarch64-apple-darwin
            asset: helomin-aarch64-macos
            binary: target/aarch64-apple-darwin/release/helomin

          - os: macos-latest
            target: x86_64-apple-darwin
            asset: helomin-x86_64-macos
            binary: target/x86_64-apple-darwin/release/helomin

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage asset
        shell: bash
        run: cp ${{ matrix.binary }} ${{ matrix.asset }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          body: ${{ needs.notes.outputs.body }}
